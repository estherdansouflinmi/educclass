name: educclass
description: Application de classe virtuelle — EduClass
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.1.3

  # Auth
  google_sign_in: ^6.2.1

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Files
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # PDF
  flutter_pdfview: ^1.3.2

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Utils
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  http: ^1.2.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
